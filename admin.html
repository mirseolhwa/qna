<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 페이지 ✿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }

  :root {
    --pink-light: #fce4ec;
    --pink-mid: #f48fb1;
    --lavender-mid: #ce93d8;
    --text-dark: #4a2040;
    --text-mid: #9c4070;
    --accent: #ff6b9d;
    --bg: #fff5f8;
    --green: #7ec8a0;
    --red: #f06292;
  }

  body {
    background: var(--bg);
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-dark);
    overflow-x: hidden;
  }

  /* 꽃잎 배경 */
  .petals-bg {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 0; overflow: hidden;
  }
  .petal {
    position: absolute; top: -20px; font-size: 14px;
    animation: fall linear infinite; opacity: 0.4;
  }
  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0deg) translateX(0); opacity: 0.6; }
    100% { transform: translateY(110vh) rotate(360deg) translateX(60px); opacity: 0; }
  }

  /* ── 로그인 화면 ── */
  .login-wrap {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
  }
  .login-box {
    background: white;
    border: 1px solid rgba(244,143,177,0.35);
    border-radius: 28px;
    padding: 48px 44px;
    width: 100%; max-width: 420px;
    text-align: center;
    animation: fadeUp 0.5s ease forwards;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

  .login-icon { font-size: 40px; margin-bottom: 16px; }
  .login-title {
    font-size: 26px; font-weight: 700;
    color: var(--text-dark); margin-bottom: 6px;
  }
  .login-sub {
    font-size: 15px; color: var(--text-mid);
    opacity: 0.7; margin-bottom: 32px; line-height: 1.7;
  }
  .login-input {
    width: 100%;
    border: 1px solid rgba(244,143,177,0.35);
    border-radius: 14px;
    padding: 14px 18px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 17px; color: var(--text-dark);
    background: var(--bg); outline: none;
    transition: border 0.2s;
    letter-spacing: 0.15em;
    text-align: center;
    margin-bottom: 16px;
  }
  .login-input:focus { border-color: var(--pink-mid); background: white; }
  .login-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--pink-mid), var(--lavender-mid));
    border: none; border-radius: 999px;
    padding: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 18px; font-weight: 700; color: white;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 2px 12px rgba(244,143,177,0.3);
  }
  .login-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 18px rgba(244,143,177,0.45); }
  .login-err {
    font-size: 14px; color: var(--red);
    margin-top: 12px; display: none;
  }

  /* ── 메인 관리자 화면 ── */
  .admin-wrap { display: none; position: relative; z-index: 1; }

  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(255,245,248,0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(244,143,177,0.2);
    padding: 16px 40px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar-title {
    font-size: 22px; font-weight: 700; color: var(--text-dark);
  }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .logout-btn {
    background: white; border: 1px solid rgba(244,143,177,0.35);
    border-radius: 999px; padding: 8px 20px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px; color: var(--text-mid); cursor: pointer;
    transition: all 0.18s;
  }
  .logout-btn:hover { background: var(--pink-light); border-color: var(--pink-mid); }
  .refresh-btn {
    background: linear-gradient(135deg, var(--pink-mid), var(--lavender-mid));
    border: none; border-radius: 999px; padding: 8px 20px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px; color: white; cursor: pointer;
    transition: all 0.18s;
  }
  .refresh-btn:hover { transform: translateY(-1px); }

  .page {
    max-width: 1000px; margin: 0 auto;
    padding: 48px 40px 120px;
  }

  /* 통계 카드 */
  .stats-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 16px; margin-bottom: 40px;
  }
  .stat-card {
    background: white;
    border: 1px solid rgba(244,143,177,0.25);
    border-radius: 20px; padding: 24px 28px;
    text-align: center;
    animation: fadeUp 0.4s ease forwards; opacity: 0;
  }
  .stat-card:nth-child(1) { animation-delay: 0.05s; }
  .stat-card:nth-child(2) { animation-delay: 0.1s; }
  .stat-card:nth-child(3) { animation-delay: 0.15s; }
  .stat-num {
    font-size: 42px; font-weight: 700;
    color: var(--accent); line-height: 1;
    margin-bottom: 6px;
  }
  .stat-label {
    font-size: 15px; color: var(--text-mid); opacity: 0.75;
  }

  /* 탭 */
  .tabs {
    display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap;
    animation: fadeUp 0.4s 0.2s ease forwards; opacity: 0;
  }
  .tab-btn {
    background: white;
    border: 1px solid rgba(244,143,177,0.3);
    border-radius: 999px; padding: 9px 26px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px; color: var(--text-mid); cursor: pointer;
    transition: all 0.18s;
  }
  .tab-btn:hover { background: var(--pink-light); }
  .tab-btn.active {
    background: var(--pink-light);
    border-color: var(--pink-mid);
    color: var(--text-dark); font-weight: 700;
  }

  /* 질문 카드 */
  .q-list {
    display: flex; flex-direction: column; gap: 20px;
    animation: fadeUp 0.4s 0.25s ease forwards; opacity: 0;
  }
  .q-card {
    background: white;
    border: 1px solid rgba(244,143,177,0.22);
    border-radius: 20px; overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .q-card:hover { box-shadow: 0 4px 20px rgba(244,143,177,0.12); }

  .q-head {
    padding: 20px 26px;
    display: flex; gap: 14px; align-items: flex-start;
    background: var(--pink-light);
  }
  .q-badge {
    font-size: 20px; font-weight: 700; color: var(--accent);
    min-width: 26px; line-height: 1.6; opacity: 0.85;
  }
  .q-content { flex: 1; }
  .q-text { font-size: 18px; line-height: 1.8; color: var(--text-dark); }
  .q-meta {
    font-size: 13px; color: var(--text-mid);
    opacity: 0.6; margin-top: 4px;
    display: flex; gap: 10px; align-items: center;
  }
  .badge-answered {
    background: #e8f5e9; color: #388e3c;
    font-size: 12px; padding: 2px 10px;
    border-radius: 999px; font-weight: 700;
  }
  .badge-pending {
    background: var(--pink-light); color: var(--text-mid);
    font-size: 12px; padding: 2px 10px;
    border-radius: 999px;
  }

  /* 답변 영역 */
  .a-section { padding: 20px 26px; }
  .a-existing {
    display: flex; gap: 14px; align-items: flex-start;
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(244,143,177,0.15);
  }
  .a-badge {
    font-size: 20px; font-weight: 700; color: var(--lavender-mid);
    min-width: 26px; line-height: 1.6; opacity: 0.85;
  }
  .a-text { font-size: 17px; line-height: 1.85; color: var(--text-dark); opacity: 0.85; }

  .answer-form { display: flex; flex-direction: column; gap: 10px; }
  .answer-label {
    font-size: 14px; color: var(--text-mid); opacity: 0.75;
  }
  .answer-textarea {
    width: 100%; min-height: 90px;
    border: 1px solid rgba(244,143,177,0.3);
    border-radius: 12px; padding: 14px 16px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px; color: var(--text-dark);
    background: var(--bg); resize: vertical; outline: none;
    transition: border 0.2s; line-height: 1.7;
  }
  .answer-textarea:focus { border-color: var(--pink-mid); background: white; }
  .answer-actions {
    display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap;
  }
  .btn-submit {
    background: linear-gradient(135deg, var(--pink-mid), var(--lavender-mid));
    border: none; border-radius: 999px;
    padding: 10px 26px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px; font-weight: 700; color: white;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 2px 10px rgba(244,143,177,0.25);
  }
  .btn-submit:hover { transform: translateY(-1px); }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .btn-delete {
    background: white;
    border: 1px solid rgba(240,98,146,0.35);
    border-radius: 999px; padding: 10px 22px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px; color: var(--red); cursor: pointer;
    transition: all 0.18s;
  }
  .btn-delete:hover { background: #fce4ec; border-color: var(--red); }

  /* 빈 상태 */
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--text-mid); opacity: 0.55;
    font-size: 18px; line-height: 2;
  }

  /* 로딩 */
  .loading {
    text-align: center; padding: 60px;
    color: var(--text-mid); opacity: 0.6; font-size: 17px;
  }

  /* 토스트 */
  .toast {
    position: fixed; bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text-dark); color: white;
    padding: 14px 28px; border-radius: 999px;
    font-size: 15px; z-index: 200;
    transition: transform 0.3s ease;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) {
    .topbar { padding: 14px 20px; }
    .page { padding: 32px 20px 100px; }
    .stats-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="petals-bg" id="petals"></div>
<div class="toast" id="toast"></div>

<!-- 로그인 -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-icon">🌸</div>
    <div class="login-title">관리자 로그인</div>
    <div class="login-sub">비밀번호를 입력해주세요 ˘ᵕ˘</div>
    <input class="login-input" type="password" id="pwInput" placeholder="••••••••" maxlength="30">
    <button class="login-btn" onclick="doLogin()">로그인 🌸</button>
    <div class="login-err" id="loginErr">비밀번호가 틀렸어요 😢</div>
  </div>
</div>

<!-- 관리자 화면 -->
<div class="admin-wrap" id="adminWrap">

  <div class="topbar">
    <div class="topbar-title">🌸 QNA 관리자</div>
    <div class="topbar-right">
      <button class="refresh-btn" onclick="loadQuestions()">새로고침</button>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="page">

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-num" id="totalCount">-</div>
        <div class="stat-label">전체 질문</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="ansCount">-</div>
        <div class="stat-label">답변 완료</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="pendCount">-</div>
        <div class="stat-label">답변 대기</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('all', this)">전체</button>
      <button class="tab-btn" onclick="switchTab('pending', this)">답변 대기</button>
      <button class="tab-btn" onclick="switchTab('answered', this)">답변 완료</button>
    </div>

    <div class="q-list" id="qList">
      <div class="loading">불러오는 중이에요 🌸</div>
    </div>

  </div>
</div>

<script>
  // ── 설정 ──
  const SUPABASE_URL = 'https://bklfqbsbzremjqgdkbwg.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrbGZxYnNienJlbWpxZ2RrYndnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyOTg5OTAsImV4cCI6MjA5Mzg3NDk5MH0.RHD8K1BKif3d8491YpQDB2wkmJIzykKNoYA-g7Sqc68';

  // ⬇ 여기서 관리자 비밀번호 바꾸세요
  const ADMIN_PASSWORD = 'll12120418';

  const api = (path, opts = {}) => fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || 'return=representation',
      ...opts.headers
    },
    ...opts
  });

  // ── 꽃잎 ──
  const petals = document.getElementById('petals');
  const symbols = ['🌸','✿','❀','🌺','✦','⋆'];
  for (let i = 0; i < 14; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    p.style.left = Math.random() * 100 + '%';
    p.style.fontSize = (10 + Math.random() * 10) + 'px';
    p.style.animationDuration = (8 + Math.random() * 14) + 's';
    p.style.animationDelay = (Math.random() * 12) + 's';
    petals.appendChild(p);
  }

  // ── 로그인 ──
  function doLogin() {
    const pw = document.getElementById('pwInput').value;
    if (pw === ADMIN_PASSWORD) {
      document.getElementById('loginWrap').style.display = 'none';
      document.getElementById('adminWrap').style.display = 'block';
      loadQuestions();
    } else {
      document.getElementById('loginErr').style.display = 'block';
      document.getElementById('pwInput').value = '';
      document.getElementById('pwInput').focus();
    }
  }

  document.getElementById('pwInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  function doLogout() {
    document.getElementById('adminWrap').style.display = 'none';
    document.getElementById('loginWrap').style.display = 'flex';
    document.getElementById('pwInput').value = '';
    document.getElementById('loginErr').style.display = 'none';
  }

  // ── 유틸 ──
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return `${d.getMonth()+1}월 ${d.getDate()}일 ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── 데이터 ──
  let allData = [];
  let currentTab = 'all';

  async function loadQuestions() {
    document.getElementById('qList').innerHTML = '<div class="loading">불러오는 중이에요 🌸</div>';
    try {
      const res = await api('questions?select=*&order=created_at.desc');
      allData = await res.json();
      renderList(currentTab);
      updateStats();
    } catch (e) {
      document.getElementById('qList').innerHTML = '<div class="empty-state">불러오기 실패했어요 😢</div>';
    }
  }

  function updateStats() {
    document.getElementById('totalCount').textContent = allData.length;
    document.getElementById('ansCount').textContent = allData.filter(q => q.answered).length;
    document.getElementById('pendCount').textContent = allData.filter(q => !q.answered).length;
  }

  function switchTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList(tab);
  }

  function renderList(tab) {
    const list = document.getElementById('qList');
    const filtered = tab === 'all' ? allData
      : tab === 'answered' ? allData.filter(q => q.answered)
      : allData.filter(q => !q.answered);

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-state">질문이 없어요 🌸</div>';
      return;
    }

    list.innerHTML = filtered.map(q => `
      <div class="q-card" id="card-${q.id}">
        <div class="q-head">
          <span class="q-badge">Q</span>
          <div class="q-content">
            <div class="q-text">${escapeHtml(q.question)}</div>
            <div class="q-meta">
              ${q.is_anonymous ? '익명' : '방문자'} · ${formatDate(q.created_at)}
              ${q.answered
                ? '<span class="badge-answered">✓ 답변완료</span>'
                : '<span class="badge-pending">대기중</span>'}
            </div>
          </div>
        </div>
        <div class="a-section">
          ${q.answered && q.answer ? `
            <div class="a-existing">
              <span class="a-badge">A</span>
              <div class="a-text">${escapeHtml(q.answer)}</div>
            </div>
          ` : ''}
          <div class="answer-form">
            <div class="answer-label">${q.answered ? '답변 수정' : '답변 작성'}</div>
            <textarea class="answer-textarea" id="ans-${q.id}" placeholder="답변을 입력해주세요 ˘ᵕ˘">${q.answer || ''}</textarea>
            <div class="answer-actions">
              <button class="btn-delete" onclick="deleteQuestion('${q.id}')">삭제 🗑</button>
              <button class="btn-submit" id="btn-${q.id}" onclick="submitAnswer('${q.id}')">
                ${q.answered ? '수정 저장 🌸' : '답변 등록 🌸'}
              </button>
            </div>
          </div>
        </div>
      </div>
    `).join('');
  }

  // ── 답변 등록/수정 ──
  async function submitAnswer(id) {
    const textarea = document.getElementById(`ans-${id}`);
    const btn = document.getElementById(`btn-${id}`);
    const answer = textarea.value.trim();
    if (!answer) { textarea.focus(); return; }

    btn.disabled = true;
    btn.textContent = '저장중...';

    try {
      const res = await api(`questions?id=eq.${id}`, {
        method: 'PATCH',
        prefer: 'return=minimal',
        body: JSON.stringify({ answer, answered: true })
      });
      if (!res.ok) throw new Error();
      showToast('답변이 등록됐어요 🌸');
      await loadQuestions();
    } catch {
      showToast('저장 실패했어요 😢');
      btn.disabled = false;
      btn.textContent = '답변 등록 🌸';
    }
  }

  // ── 질문 삭제 ──
  async function deleteQuestion(id) {
    if (!confirm('정말 삭제할까요?')) return;
    try {
      const res = await api(`questions?id=eq.${id}`, {
        method: 'DELETE',
        prefer: 'return=minimal'
      });
      if (!res.ok) throw new Error();
      showToast('삭제됐어요 🗑');
      await loadQuestions();
    } catch {
      showToast('삭제 실패했어요 😢');
    }
  }
</script>
</body>
</html>
